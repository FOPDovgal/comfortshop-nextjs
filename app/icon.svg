<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background for max contrast -->
  <rect width="32" height="32" rx="6.5" fill="#0f172a"/>

  <!-- Chimney - white -->
  <rect x="19.5" y="7.5" width="3" height="7" rx="0.7" fill="white" opacity="0.9"/>

  <!-- Roof - RED -->
  <polygon points="16,3 1,17 31,17" fill="#f43f5e"/>

  <!-- Left wall - GREEN -->
  <rect x="5" y="16" width="11" height="13" fill="#4ade80"/>

  <!-- Right wall - BLUE -->
  <rect x="16" y="16" width="11" height="13" fill="#60a5fa"/>

  <!-- Center seam line -->
  <line x1="16" y1="16" x2="16" y2="29" stroke="#0f172a" stroke-width="0.8" opacity="0.5"/>

  <!-- Door - golden yellow -->
  <rect x="12" y="21.5" width="8" height="7.5" rx="1.2" fill="#fbbf24"/>
  <!-- Door knob -->
  <circle cx="19" cy="25.5" r="0.7" fill="#0f172a" opacity="0.5"/>
</svg>
