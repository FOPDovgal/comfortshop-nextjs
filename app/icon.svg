<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="6.5" fill="url(#bg)"/>

  <!-- Chimney -->
  <rect x="19.5" y="7" width="3.5" height="7" rx="0.8" fill="white" opacity="0.9"/>

  <!-- Roof (triangle) -->
  <polygon points="16,4 2,17 30,17" fill="white" opacity="0.95"/>

  <!-- House body -->
  <rect x="6" y="16" width="20" height="13" rx="0.5" fill="white" opacity="0.95"/>

  <!-- Left window (warm glow) -->
  <rect x="7.5" y="18.5" width="5.5" height="4.5" rx="1" fill="url(#glow)"/>
  <!-- Cross on left window -->
  <line x1="10.25" y1="18.5" x2="10.25" y2="23" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="7.5" y1="20.75" x2="13" y2="20.75" stroke="white" stroke-width="0.6" opacity="0.6"/>

  <!-- Right window (warm glow) -->
  <rect x="19" y="18.5" width="5.5" height="4.5" rx="1" fill="url(#glow)"/>
  <!-- Cross on right window -->
  <line x1="21.75" y1="18.5" x2="21.75" y2="23" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="19" y1="20.75" x2="24.5" y2="20.75" stroke="white" stroke-width="0.6" opacity="0.6"/>

  <!-- Door -->
  <rect x="12.5" y="21" width="7" height="8" rx="1" fill="#fb923c"/>
  <!-- Door knob -->
  <circle cx="18.5" cy="25" r="0.8" fill="white" opacity="0.7"/>
</svg>
